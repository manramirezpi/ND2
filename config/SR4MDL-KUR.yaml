HomoKUR:
  network: 
    V: 10
    E: 40
    direction: True
  N: 1000
  dt: 0.01
  root_type: node
  variables:
    independent:
      x:
        type: node
        initialize: np.random.uniform(-np.pi, np.pi, (1, V))
        update: np.mod(x + dx * dt + np.pi, 2 * np.pi) - np.pi
      # omega0:
      #   type: node
      #   initialize: np.random.uniform(-5, 5, (1, V))
      #   update: omega0
    dependent:
      dx:
        type: node
        GD_expr: 1.0 + 1.0*aggr(sin(sour(x, G, A)-targ(x, G, A)), G, A)
  plot: [sin(x)]
